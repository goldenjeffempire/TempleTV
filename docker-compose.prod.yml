version: "3.9"

# =============================================================================
# Temple TV — Production Docker Compose Override
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requirements:
#   All secrets must be set in the environment or a .env file that is
#   NOT committed to version control. See .env.example for the full list.

services:
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/templetv/temple-tv-api:${IMAGE_TAG:-latest}
    build:
      args:
        BUILD_VERSION: ${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: "8080"
      LOG_LEVEL: info
      RUN_MODE: all
      MALLOC_ARENA_MAX: "2"
      NODE_OPTIONS: "--max-old-space-size=1536 --max-http-header-size=16384"
      MEMORY_WARN_RSS_MB: "1500"
      MEMORY_RESTART_RSS_MB: "1800"
      HTTP_KEEPALIVE_MS: "75000"
      HTTP_HEADERS_TIMEOUT_MS: "80000"
      SHUTDOWN_DRAIN_MS: "10000"
      # All secrets injected from host environment — never hardcode here
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Temple TV | JCTM}
      SENTRY_DSN: ${SENTRY_DSN:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://templetv.org.ng,https://admin.templetv.org.ng,https://tv.templetv.org.ng}
      CDN_BASE_URL: ${CDN_BASE_URL:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
        reservations:
          memory: 512m
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  admin:
    image: ${DOCKER_REGISTRY:-ghcr.io}/templetv/temple-tv-admin:${IMAGE_TAG:-latest}
    environment:
      VITE_API_URL: ${API_URL:-https://api.templetv.org.ng}
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
      update_config:
        parallelism: 1
        failure_action: rollback
        order: start-first
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  db:
    environment:
      POSTGRES_DB: ${PGDATABASE:-templetv}
      POSTGRES_USER: ${PGUSER:-templetv}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    restart: always
    command: >
      redis-server
        --appendonly yes
        --maxmemory 1gb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-}
        --loglevel notice
    deploy:
      resources:
        limits:
          memory: 1200m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx reverse proxy (optional — use when not behind a cloud LB) ─────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api
      - admin
    restart: always
    profiles: [nginx]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
  uploads:
  nginx_cache:
