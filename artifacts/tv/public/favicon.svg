<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Temple TV">
  <title>Temple TV</title>
  <!--
    Favicon monogram for the Smart-TV app — same design language as the
    admin favicon (brand consistency across surfaces). Stays legible at
    16×16 px on browser tabs and at 192/512 px when used as a PWA icon
    inside the Tizen / webOS / Android-TV launchers via manifest.
  -->
  <rect width="64" height="64" rx="12" ry="12" fill="#E11D48"/>
  <text
    x="22"
    y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="44"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="alphabetic"
  >T</text>
  <circle cx="48" cy="44" r="14" fill="#1E3A8A"/>
  <text
    x="48"
    y="49"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="14"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
  >tv</text>
</svg>
