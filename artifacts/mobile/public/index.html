<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Temple TV</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <!--
      Replit dev environment: the mobile web preview is served under the /mobile/
      prefix via the API server proxy. This script runs synchronously before the
      deferred Metro bundle script, rewrites the URL to strip the /mobile prefix,
      and lets Expo Router find the index route at /. Metro's process shim creates
      a local 'process' var that shadows window.process, so window.process.env
      injection does not reach the bundle — history.replaceState is the only
      reliable mechanism.
    -->
    <script>
      (function () {
        try {
          var b = "/mobile";
          var p = location.pathname;
          if (p === b || p.startsWith(b + "/")) {
            var np = p.slice(b.length) || "/";
            history.replaceState(null, "", np + location.search + location.hash);
          }
        } catch (e) {
          // ignore in environments where history API is unavailable
        }
      })();
    </script>

    <!--
      Web-only Feather icon font preload. On native (Expo Go / EAS builds) the
      @expo/vector-icons font is auto-bundled and loaded by RN's asset system.
      On Expo web, useFonts({ ...Feather.font }) is unreliable through the
      Metro asset pipeline when EXPO_BASE_URL=/mobile is set — the asset URL
      rewriting causes the TTF fetch to 404 and every <Feather /> renders as
      a placeholder □. Bypassing Metro by serving the TTF from /public and
      injecting an @font-face directly is bulletproof: the browser loads the
      font over plain HTTP before React mounts, and the font-family name
      "Feather" matches what the @expo/vector-icons Text component sets.
    -->
    <style id="ttv-icon-fonts">
      @font-face {
        font-family: "Feather";
        src: url("/mobile/Feather.ttf") format("truetype"),
             url("./Feather.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
