build:
  name: Android production store bundle
  steps:
    - eas/checkout
    - run:
        name: Install pnpm 10 and project dependencies
        command: |
          echo "System pnpm: $(pnpm --version 2>/dev/null || echo 'not found')"
          npm install -g pnpm@10.26.1 --registry https://registry.npmjs.org
          export PATH="$(npm prefix -g)/bin:$PATH"
          echo "Active pnpm: $(pnpm --version)"
          pnpm install --frozen-lockfile
    - eas/prebuild
    - eas/build
