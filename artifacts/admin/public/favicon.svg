<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Temple TV">
  <title>Temple TV</title>
  <!--
    Favicon monogram for the admin app — designed to stay legible at the
    16×16 px browser tab size where the full Temple-TV wordmark would be
    unreadable. Brand-faithful colour split: red square (matches the
    "Temple" wordmark colour) holds a stylised serif "T", with the blue
    ".tv" badge anchored bottom-right (same blue as the brand mark's
    `.tv` chip). Looks identical at 16, 32, 64, and 180 px.
  -->
  <rect width="64" height="64" rx="12" ry="12" fill="#E11D48"/>
  <text
    x="22"
    y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="44"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="alphabetic"
  >T</text>
  <circle cx="48" cy="44" r="14" fill="#1E3A8A"/>
  <text
    x="48"
    y="49"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="14"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
  >tv</text>
</svg>
