# =============================================================================
# Temple TV — OTA Update (JS-only, zero downtime)
# =============================================================================
#
# Fires on every push to main that only changes JavaScript/assets — no native
# code. EAS Update publishes a new bundle to the `production` channel and all
# running apps silently download it on next foreground resume.
#
# Can also be triggered manually from the Admin Dashboard (OTA Updates page)
# via the workflow_dispatch event, which allows selecting any channel and
# providing a custom release message.
#
# If native files change (android/, ios/, eas.json, package.json,
# pnpm-lock.yaml) this workflow skips and a full EAS Build is required.
#
# Required secrets:
#   EXPO_TOKEN — EAS personal access token
# =============================================================================

name: OTA Update

on:
  push:
    branches:
      - main
    paths:
      # Only run when JS/assets change
      - 'artifacts/mobile/app/**'
      - 'artifacts/mobile/components/**'
      - 'artifacts/mobile/hooks/**'
      - 'artifacts/mobile/lib/**'
      - 'artifacts/mobile/store/**'
      - 'artifacts/mobile/constants/**'
      - 'artifacts/mobile/assets/**'
      # Exclude anything that changes native layers
      - '!artifacts/mobile/android/**'
      - '!artifacts/mobile/ios/**'
      - '!artifacts/mobile/eas.json'
      - '!artifacts/mobile/package.json'
      - '!**/pnpm-lock.yaml'

  # Manual trigger from the Admin Dashboard "OTA Updates" page.
  # GITHUB_TOKEN must have actions:write permission on the repo.
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS update channel (e.g. production, staging, preview, firetv, androidtv, appletv)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - preview
          - firetv
          - androidtv
          - appletv
      message:
        description: 'Release message (shown in EAS update history)'
        required: true
        default: 'Admin-triggered OTA update'
        type: string

concurrency:
  group: ota-update
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: '10.26.1'
  # Redirect git index to /tmp so EAS CLI can write the lock file in
  # restricted sandbox environments (Replit, some CI runners) without hitting
  # a "could not lock index" error during the project archive upload step.
  GIT_INDEX_FILE: /tmp/eas-build-index

jobs:
  ota:
    name: Publish OTA update
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: COREPACK_ENABLE_STRICT=0 pnpm install --ignore-scripts --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve channel and message
        id: params
        run: |
          # workflow_dispatch wins; fall back to push-to-main defaults
          CHANNEL="${{ github.event.inputs.channel || 'production' }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            MSG="OTA: ${{ github.event.head_commit.message }}"
          else
            MSG="${{ github.event.inputs.message }}"
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "message=${MSG}"     >> "$GITHUB_OUTPUT"

      - name: Publish OTA update
        working-directory: artifacts/mobile
        run: |
          eas update \
            --channel "${{ steps.params.outputs.channel }}" \
            --message "${{ steps.params.outputs.message }}" \
            --non-interactive
          echo "OTA update published to ${{ steps.params.outputs.channel }} channel."

      - name: Write job summary
        run: |
          echo "## OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ steps.params.outputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ steps.params.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
