name: release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options: [staging, production]
      release_sha:
        description: Git SHA to release
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:production

  deploy-render:
    runs-on: ubuntu-latest
    needs: preflight
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Health check
        env:
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          test -n "$API_HEALTHCHECK_URL"
          for i in $(seq 1 24); do
            if curl -fsSL "$API_HEALTHCHECK_URL" >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check did not pass in time" >&2
          exit 1

  rollback:
    runs-on: ubuntu-latest
    needs: deploy-render
    if: failure()
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Trigger rollback hook
        env:
          RENDER_ROLLBACK_HOOK_URL: ${{ secrets.RENDER_ROLLBACK_HOOK_URL }}
        run: |
          test -n "$RENDER_ROLLBACK_HOOK_URL"
          curl -fsSL -X POST "$RENDER_ROLLBACK_HOOK_URL"
