openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Temple TV JCTM Admin API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin-stats
    description: Dashboard statistics
  - name: admin-videos
    description: Video management
  - name: admin-playlists
    description: Playlist management
  - name: admin-schedule
    description: Content scheduling
  - name: admin-notifications
    description: Push notification sending
  - name: admin-analytics
    description: Analytics data
  - name: admin-live
    description: Live stream management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin-stats]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/videos:
    get:
      operationId: listAdminVideos
      tags: [admin-videos]
      summary: List all managed videos
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"

  /admin/videos/import:
    post:
      operationId: importVideo
      tags: [admin-videos]
      summary: Import a video from YouTube URL or video ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportVideoBody"
      responses:
        "201":
          description: Video imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedVideo"
        "400":
          description: Invalid YouTube URL or video ID

  /admin/videos/{id}:
    put:
      operationId: updateAdminVideo
      tags: [admin-videos]
      summary: Update video metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVideoBody"
      responses:
        "200":
          description: Video updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedVideo"
    delete:
      operationId: deleteAdminVideo
      tags: [admin-videos]
      summary: Remove a video from the library
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/playlists:
    get:
      operationId: listPlaylists
      tags: [admin-playlists]
      summary: List all playlists
      responses:
        "200":
          description: List of playlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playlist"
    post:
      operationId: createPlaylist
      tags: [admin-playlists]
      summary: Create a new playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylistBody"
      responses:
        "201":
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"

  /admin/playlists/{id}:
    get:
      operationId: getPlaylist
      tags: [admin-playlists]
      summary: Get playlist with its videos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Playlist with videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistWithVideos"
    put:
      operationId: updatePlaylist
      tags: [admin-playlists]
      summary: Update playlist metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaylistBody"
      responses:
        "200":
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
    delete:
      operationId: deletePlaylist
      tags: [admin-playlists]
      summary: Delete a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Playlist deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/playlists/{id}/videos:
    post:
      operationId: addVideoToPlaylist
      tags: [admin-playlists]
      summary: Add a video to a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddVideoToPlaylistBody"
      responses:
        "200":
          description: Video added to playlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistWithVideos"

  /admin/playlists/{id}/videos/{videoId}:
    delete:
      operationId: removeVideoFromPlaylist
      tags: [admin-playlists]
      summary: Remove a video from a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video removed from playlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistWithVideos"

  /admin/playlists/{id}/reorder:
    put:
      operationId: reorderPlaylist
      tags: [admin-playlists]
      summary: Reorder videos in a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPlaylistBody"
      responses:
        "200":
          description: Playlist reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistWithVideos"

  /admin/schedule:
    get:
      operationId: listSchedule
      tags: [admin-schedule]
      summary: Get the weekly content schedule
      responses:
        "200":
          description: Schedule entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntry"
    post:
      operationId: createScheduleEntry
      tags: [admin-schedule]
      summary: Create a schedule entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleEntryBody"
      responses:
        "201":
          description: Schedule entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"

  /admin/schedule/{id}:
    put:
      operationId: updateScheduleEntry
      tags: [admin-schedule]
      summary: Update a schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleEntryBody"
      responses:
        "200":
          description: Schedule entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"
    delete:
      operationId: deleteScheduleEntry
      tags: [admin-schedule]
      summary: Delete a schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schedule entry deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/notifications/send:
    post:
      operationId: sendPushNotification
      tags: [admin-notifications]
      summary: Send push notification to all app subscribers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationBody"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResult"

  /admin/notifications/history:
    get:
      operationId: listNotificationHistory
      tags: [admin-notifications]
      summary: Get past sent notifications
      responses:
        "200":
          description: Notification history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentNotification"

  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin-analytics]
      summary: Get analytics overview
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"

  /admin/live:
    get:
      operationId: getLiveStatus
      tags: [admin-live]
      summary: Get current live stream status
      responses:
        "200":
          description: Live stream status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AdminStats:
      type: object
      properties:
        totalVideos:
          type: integer
        totalPlaylists:
          type: integer
        activeScheduleEntries:
          type: integer
        notificationsSentToday:
          type: integer
        isLiveNow:
          type: boolean
        liveViewerEstimate:
          type: integer
        recentImports:
          type: integer
        topCategory:
          type: string
      required:
        - totalVideos
        - totalPlaylists
        - activeScheduleEntries
        - notificationsSentToday
        - isLiveNow
        - liveViewerEstimate
        - recentImports
        - topCategory

    ManagedVideo:
      type: object
      properties:
        id:
          type: string
        youtubeId:
          type: string
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: string
        category:
          type: string
        preacher:
          type: string
        publishedAt:
          type: string
        importedAt:
          type: string
        viewCount:
          type: integer
        featured:
          type: boolean
      required:
        - id
        - youtubeId
        - title
        - thumbnailUrl
        - category
        - preacher
        - importedAt
        - featured

    VideoListResponse:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/ManagedVideo"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [videos, total, page, totalPages]

    ImportVideoBody:
      type: object
      properties:
        youtubeId:
          type: string
        category:
          type: string
        preacher:
          type: string
        featured:
          type: boolean
      required: [youtubeId]

    UpdateVideoBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        preacher:
          type: string
        featured:
          type: boolean

    Playlist:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        loopMode:
          type: string
          enum: [sequential, random, none]
        isActive:
          type: boolean
        videoCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, loopMode, isActive, videoCount, createdAt, updatedAt]

    PlaylistWithVideos:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        loopMode:
          type: string
          enum: [sequential, random, none]
        isActive:
          type: boolean
        videos:
          type: array
          items:
            $ref: "#/components/schemas/PlaylistVideo"
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, loopMode, isActive, videos, createdAt, updatedAt]

    PlaylistVideo:
      type: object
      properties:
        id:
          type: string
        youtubeId:
          type: string
        title:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
      required: [id, youtubeId, title, thumbnailUrl, category, sortOrder]

    CreatePlaylistBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        loopMode:
          type: string
          enum: [sequential, random, none]
        isActive:
          type: boolean
      required: [name]

    UpdatePlaylistBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        loopMode:
          type: string
          enum: [sequential, random, none]
        isActive:
          type: boolean

    AddVideoToPlaylistBody:
      type: object
      properties:
        videoId:
          type: string
      required: [videoId]

    ReorderPlaylistBody:
      type: object
      properties:
        videoIds:
          type: array
          items:
            type: string
      required: [videoIds]

    ScheduleEntry:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
        endTime:
          type: string
        contentType:
          type: string
          enum: [live, playlist, video]
        contentId:
          type: string
        isRecurring:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - dayOfWeek
        - startTime
        - contentType
        - isRecurring
        - isActive
        - createdAt

    CreateScheduleEntryBody:
      type: object
      properties:
        title:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
        endTime:
          type: string
        contentType:
          type: string
          enum: [live, playlist, video]
        contentId:
          type: string
        isRecurring:
          type: boolean
        isActive:
          type: boolean
      required: [title, dayOfWeek, startTime, contentType]

    UpdateScheduleEntryBody:
      type: object
      properties:
        title:
          type: string
        dayOfWeek:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        contentType:
          type: string
          enum: [live, playlist, video]
        contentId:
          type: string
        isRecurring:
          type: boolean
        isActive:
          type: boolean

    SendNotificationBody:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [live_service, new_sermon, announcement, custom]
        videoId:
          type: string
      required: [title, body, type]

    NotificationResult:
      type: object
      properties:
        sent:
          type: integer
        failed:
          type: integer
        message:
          type: string
      required: [sent, failed, message]

    SentNotification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        type:
          type: string
        sentAt:
          type: string
        sentCount:
          type: integer
      required: [id, title, body, type, sentAt, sentCount]

    Analytics:
      type: object
      properties:
        period:
          type: string
        totalViews:
          type: integer
        uniqueViewers:
          type: integer
        avgWatchTimeMinutes:
          type: number
        liveStreamEvents:
          type: integer
        topVideos:
          type: array
          items:
            $ref: "#/components/schemas/VideoAnalytics"
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"
        dailyViews:
          type: array
          items:
            $ref: "#/components/schemas/DailyViewStat"
      required:
        - period
        - totalViews
        - uniqueViewers
        - avgWatchTimeMinutes
        - liveStreamEvents
        - topVideos
        - categoryBreakdown
        - dailyViews

    VideoAnalytics:
      type: object
      properties:
        youtubeId:
          type: string
        title:
          type: string
        views:
          type: integer
        thumbnailUrl:
          type: string
      required: [youtubeId, title, views, thumbnailUrl]

    CategoryStat:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required: [category, count, percentage]

    DailyViewStat:
      type: object
      properties:
        date:
          type: string
        views:
          type: integer
      required: [date, views]

    LiveStatus:
      type: object
      properties:
        isLive:
          type: boolean
        videoId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        startedAt:
          type: string
          nullable: true
        viewerCount:
          type: integer
      required: [isLive, viewerCount]

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]
