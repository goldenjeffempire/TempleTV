# ─── Shared environment groups ────────────────────────────────────────────────
# Render gives every service its OWN environment-variable scope. Historically
# this meant the operator had to set the AWS credentials on the API service
# AND mirror them onto the worker service by hand — and a single missed mirror
# crashloops the worker (it `Refusing to start (role=worker)` because uploads
# would otherwise land on ephemeral disk and disappear on next deploy).
#
# Defining `temple-tv-aws` as an environment group means the operator sets the
# four AWS values ONCE in the "Environment Groups" page of the Render dashboard
# and every service that lists `fromGroup: temple-tv-aws` inherits them. The
# per-service `key: AWS_*` entries below still take precedence when set, so
# existing dashboard values on already-deployed services are NOT disturbed by
# adopting this group — populating the group simply removes the failure mode
# for any future service (including the worker today).
envVarGroups:
  - name: temple-tv-aws
    envVars:
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

services:
  # Bumped from `starter` (512 MB) to `standard` (2 GB). Range-streaming
  # large MP4s on the 512 MB instance was OOM-killing this process under
  # parallel client load (see RELEASE_AUDIT / staticWithS3Fallback notes).
  # `/api/uploads/*` now also 302-redirects to S3 (lib/staticWithS3Fallback.ts
  # `redirectFromS3` mode), so the API process should stay well under the
  # new ceiling — the bigger plan is defence-in-depth for spikes.
  - type: web
    name: temple-tv-api
    runtime: node
    plan: standard
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    # Invoke `node` directly instead of routing through `pnpm run start`. The
    # pnpm-mediated invocation made every cold-start (deploy, restart, OOM
    # recovery) re-trigger Corepack to download pnpm-10.33.2.tgz from npm
    # before Node ever booted — adding 5–10s of needless latency to every
    # restart and a hard dependency on npmjs.org being reachable. Calling
    # node straight from the artifact directory is faster, has no external
    # dependency at boot, and produces identical runtime behavior.
    startCommand: cd artifacts/api-server && node --enable-source-maps --import ./dist/instrument.mjs ./dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    numInstances: 1
    disk:
      name: temple-tv-uploads
      mountPath: /opt/render/project/src/artifacts/api-server/uploads
      sizeGB: 10
    envVars:
      # AWS credentials inherited from the shared env-var group above. The
      # explicit per-service `key: AWS_*` entries further down still take
      # precedence when populated, so the currently-set dashboard values are
      # respected; once the operator populates the group, both the API and
      # the worker pick the values up automatically and the per-service
      # entries can be removed in a follow-up edit.
      - fromGroup: temple-tv-aws
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      # Process role: "api" runs HTTP only (no ffmpeg, no transcode loop).
      # The temple-tv-transcoder worker below runs RUN_MODE=worker. This
      # split prevents ffmpeg memory spikes from killing the API process.
      - key: RUN_MODE
        value: api
      - key: ALLOWED_ORIGINS
        value: https://templetv.org.ng,https://www.templetv.org.ng,https://api.templetv.org.ng,https://admin.templetv.org.ng,https://tv.templetv.org.ng
      - key: API_BASE_URL
        value: https://api.templetv.org.ng
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: CLIENT_ERROR_SINK_URL
        sync: false
      - key: CLIENT_ERROR_SINK_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        value: https://e1d80a0a1acfca1dc8743cc701de446c@o4511258419462144.ingest.us.sentry.io/4511258444693504
      - key: SENTRY_RELEASE
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DEFAULT_OBJECT_STORAGE_BUCKET_ID
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  # ─── Transcoder worker ─────────────────────────────────────────────────────
  # Runs the same codebase with RUN_MODE=worker: ffmpeg preflight, the queue
  # claim loop (FOR UPDATE SKIP LOCKED), and S3 upload of HLS variants.
  # No HTTP listener, no SSE, no schedulers. Reads source MP4s from S3 into
  # /tmp scratch space, transcodes, uploads variants back to S3, marks the
  # queue row complete. The API service (above) serves the HLS files via the
  # S3 fallback middleware (`lib/staticWithS3Fallback.ts`).
  #
  # Memory containment in `lib/transcoder.ts` (FFMPEG_THREADS, x264 lookahead
  # caps, RSS-based backpressure) still applies inside the worker so a single
  # large encode cannot OOM-kill the worker mid-job.
  - type: worker
    name: temple-tv-transcoder
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    # Same direct-node optimization as the API service above — eliminates the
    # Corepack/pnpm download on every worker cold-start. Critical for a
    # worker process because Render restarts workers more aggressively than
    # web services (no health-check grace window).
    startCommand: cd artifacts/api-server && node --enable-source-maps --import ./dist/instrument.mjs ./dist/index.mjs
    autoDeploy: true
    numInstances: 1
    envVars:
      # AWS credentials inherited from the shared env-var group above. This
      # is the FIX for the historical worker crashloop where the operator
      # had set AWS_* on the API service but forgotten to mirror them onto
      # this worker service — the runtime guard in `index.ts` would log
      # `Refusing to start (role=worker): AWS S3 is required…` and exit 1.
      # Populating `temple-tv-aws` once now satisfies both services.
      - fromGroup: temple-tv-aws
      - key: NODE_ENV
        value: production
      # PORT is required by the index.ts validator only when RUN_MODE=api.
      # We still set it so any future code that reads PORT does not crash.
      - key: PORT
        value: 8080
      - key: RUN_MODE
        value: worker
      # Conservative tuning for the 512MB starter plan. Bump these alongside
      # any plan upgrade — no code changes required.
      - key: FFMPEG_THREADS
        value: 2
      - key: MAX_NODE_RSS_MB_BEFORE_TRANSCODE
        value: 380
      - key: DATABASE_URL
        sync: false
      # JWT_SECRET is unused by the worker but the startup validator requires
      # it. Use the same value as the API service via Render's "sync" env
      # group — set this manually in the dashboard to match the API.
      - key: JWT_SECRET
        sync: false
      - key: SENTRY_DSN
        value: https://e1d80a0a1acfca1dc8743cc701de446c@o4511258419462144.ingest.us.sentry.io/4511258444693504
      - key: SENTRY_RELEASE
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: temple-tv-admin
    runtime: static
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/admin run build
    staticPublishPath: ./artifacts/admin/dist/public
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://api.templetv.org.ng
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: temple-tv-web
    runtime: static
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/mobile run build:web
    staticPublishPath: ./artifacts/mobile/web-dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://api.templetv.org.ng
      - key: EXPO_PUBLIC_DOMAIN
        value: api.templetv.org.ng
      - key: BASE_PATH
        value: /
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /_expo/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: temple-tv-tv
    runtime: static
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/tv run build
    staticPublishPath: ./artifacts/tv/dist/public
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://api.templetv.org.ng
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
