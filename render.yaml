services:
  - type: web
    name: temple-tv-api
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    autoDeploy: true
    numInstances: 1
    disk:
      name: temple-tv-uploads
      mountPath: /opt/render/project/src/artifacts/api-server/uploads
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: ALLOWED_ORIGINS
        value: https://templetv.org.ng,https://www.templetv.org.ng,https://api.templetv.org.ng,https://admin.templetv.org.ng,https://tv.templetv.org.ng
      - key: API_BASE_URL
        value: https://api.templetv.org.ng
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: CLIENT_ERROR_SINK_URL
        sync: false
      - key: CLIENT_ERROR_SINK_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        value: https://e1d80a0a1acfca1dc8743cc701de446c@o4511258419462144.ingest.us.sentry.io/4511258444693504
      - key: SENTRY_RELEASE
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DEFAULT_OBJECT_STORAGE_BUCKET_ID
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false

  - type: web
    name: temple-tv-admin
    runtime: static
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/admin run build
    staticPublishPath: ./artifacts/admin/dist/public
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://api.templetv.org.ng
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: temple-tv-tv
    runtime: static
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/tv run build
    staticPublishPath: ./artifacts/tv/dist/public
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://api.templetv.org.ng
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
