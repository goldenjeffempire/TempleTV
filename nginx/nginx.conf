worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 75s;
  keepalive_requests 1000;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/atom+xml image/svg+xml font/woff font/woff2;

  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=512m inactive=60m use_temp_path=off;

  # ── Rate limiting zones ──────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

  # ── Upstream servers ─────────────────────────────────────────────────────────
  upstream api_backend {
    server api:8080;
    keepalive 32;
  }

  upstream admin_backend {
    server admin:80;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── API — api.templetv.org.ng ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.templetv.org.ng;

    ssl_certificate     /etc/nginx/ssl/api.templetv.org.ng/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.templetv.org.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2g;
    client_body_buffer_size 256k;
    proxy_request_buffering off;

    # Auth endpoints — tight rate limit
    location ~ ^/api/(v1/)?(auth|seed) {
      limit_req zone=auth_limit burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    # SSE broadcast — no buffering, long timeout
    location /api/broadcast/events {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      chunked_transfer_encoding on;
      add_header Cache-Control "no-cache" always;
      add_header Content-Type "text/event-stream" always;
    }

    # WebSocket playback gateway
    location /api/playback/ws {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    # Video upload — extended timeout for large chunks (up to 16 MiB chunks × retries)
    location ~ ^/api/(v1/)?admin/videos/upload {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_request_buffering off;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      client_max_body_size 2g;
    }

    # General API — standard rate limit
    location /api {
      limit_req zone=api_limit burst=30 nodelay;
      limit_req_status 429;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location /healthz {
      proxy_pass http://api_backend/api/healthz;
      access_log off;
    }
  }

  # ── Admin — admin.templetv.org.ng ────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name admin.templetv.org.ng;

    ssl_certificate     /etc/nginx/ssl/admin.templetv.org.ng/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.templetv.org.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.templetv.org.ng wss://api.templetv.org.ng;" always;

    location / {
      proxy_pass http://admin_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_cache static_cache;
      proxy_cache_valid 200 5m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
      proxy_cache_bypass $http_cache_control;
      add_header X-Cache-Status $upstream_cache_status always;
    }
  }

  # ── TV — tv.templetv.org.ng ──────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name tv.templetv.org.ng;

    ssl_certificate     /etc/nginx/ssl/tv.templetv.org.ng/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/tv.templetv.org.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }
  }
}
