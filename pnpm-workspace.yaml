packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  # Bumped to ~19.2.x (April 28 2026) after a Render build caught a second
  # parallel install at 19.2.14 alongside the catalog's 19.1.17 — some
  # transitive dep declares a peerDependency on `@types/react: ^19.2.0`
  # that 19.1.x cannot satisfy, so pnpm hoists a second copy in violation
  # of the singleton invariant. The fix is two-part:
  #   (1) catalog is now exact-pinned at 19.2.14 / 19.2.3 (no `~` or `^`)
  #   (2) `pnpm.overrides` in root package.json forces every transitive
  #       resolution to the same exact version regardless of any peer range
  # Together this makes a duplicate install structurally impossible.
  # @types/react@19.2.x is forward-compatible with react@19.1.0 (types are
  # additive across minor versions), so the runtime is unaffected.
  # `pnpm run verify:react-types-singleton` fails the deploy if this ever
  # regresses; `pnpm run verify:catalog` fails it if catalog/lockfile drift.
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.1
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.2.0
  react-dom: 19.2.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  # Kept at ^8.0.0 to match the root `pnpm.overrides.vite: ">=7.3.2"` which
  # forces vite 8.x via a transitive resolution. If you want vite 7 back,
  # remove the override AND set this back to ^7.3.0 in the same commit.
  # `pnpm run verify:catalog` will fail the deploy if these two ever drift.
  vite: ^8.0.0
  zod: 3.25.76

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver
